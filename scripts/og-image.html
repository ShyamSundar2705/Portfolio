<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OG Image</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background-color: #0a0a0f;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Gradient blob — top right */
    .blob {
      position: absolute;
      top: -120px;
      right: -100px;
      width: 520px;
      height: 520px;
      background: radial-gradient(circle at 60% 40%, rgba(139,92,246,0.35) 0%, rgba(59,130,246,0.25) 45%, transparent 70%);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
    }

    /* Secondary blob — bottom left */
    .blob-2 {
      position: absolute;
      bottom: -80px;
      left: -60px;
      width: 340px;
      height: 340px;
      background: radial-gradient(circle, rgba(59,130,246,0.18) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(50px);
      pointer-events: none;
    }

    /* Glass card */
    .card {
      position: relative;
      z-index: 1;
      width: 1080px;
      height: 510px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 24px;
      padding: 52px 56px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Inner layout: left content + right pills */
    .card-inner {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex: 1;
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
      max-width: 620px;
    }

    /* Monogram */
    .monogram {
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(135deg, #3b82f6, #9333ea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      margin-bottom: 36px;
    }

    /* Name */
    .name {
      font-size: 72px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.05;
      letter-spacing: -2px;
      margin-bottom: 18px;
    }

    /* Tagline */
    .tagline {
      font-size: 22px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      letter-spacing: -0.2px;
      line-height: 1.4;
    }

    /* Domain footer */
    .domain {
      font-size: 17px;
      font-weight: 600;
      background: linear-gradient(135deg, #3b82f6, #9333ea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: 40px;
    }

    /* Skills grid — right side */
    .skills {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-content: center;
      padding-top: 4px;
    }

    .pill {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
      text-align: center;
      white-space: nowrap;
    }

    /* Subtle inner glow on card */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(59,130,246,0.06) 0%, transparent 60%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="blob"></div>
  <div class="blob-2"></div>

  <div class="card">
    <div class="card-inner">
      <div class="left">
        <div>
          <div class="monogram">SS</div>
          <div class="name">Shyam Sundar</div>
          <div class="tagline">Full Stack Developer · Cloud Engineer · AI Builder</div>
        </div>
        <div class="domain">shyamsundar.is-a.dev</div>
      </div>

      <div class="skills">
        <div class="pill">React</div>
        <div class="pill">Next.js</div>
        <div class="pill">AWS</div>
        <div class="pill">Python</div>
        <div class="pill">Docker</div>
        <div class="pill">LangGraph</div>
      </div>
    </div>
  </div>
</body>
</html>
